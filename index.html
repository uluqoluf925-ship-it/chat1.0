<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>DeepSeek · 三区记忆系统 (API强化版)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; background: #0b0b0b; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f3f; }
    select option { background: #151515; color: #e0e0e0; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ----- 模型列表 (最新) -----
const MODELS = [
  { id: "deepseek-chat", label: "DeepSeek-V3 (最新)" },
  { id: "deepseek-reasoner", label: "DeepSeek-R1 (深度思考)" },
];

// ----- 持久化存储Key (新增高级设置存储) -----
const STORAGE_KEYS = {
  API_KEY: 'ds_enhanced_api_key',
  HISTORY: 'ds_enhanced_history',
  SYS_PROMPT: 'ds_enhanced_sys_prompt',
  FILES: 'ds_enhanced_files',
  ADVANCED: 'ds_enhanced_advanced',     // 新增
};

// ----- 样式常量 (保持原有风格) -----
const S = {
  root: {
    fontFamily: "'Inter', -apple-system, 'Segoe UI', 'Roboto', system-ui, sans-serif",
    background: "#0b0b0b", color: "#e4e4e4",
    height: "100vh", display: "flex", flexDirection: "column",
    overflow: "hidden", fontSize: "14px",
  },
  header: {
    padding: "8px 16px", borderBottom: "1px solid #262626",
    display: "flex", gap: "10px", alignItems: "center",
    flexWrap: "wrap", background: "#111111",
    backdropFilter: "blur(8px)",
  },
  input: {
    background: "#181818", border: "1px solid #333333",
    color: "#f0f0f0", padding: "6px 10px",
    fontSize: "13px", fontFamily: "inherit", outline: "none",
    borderRadius: "6px", transition: "border 0.2s",
  },
  select: {
    background: "#181818", border: "1px solid #333333",
    color: "#f0f0f0", padding: "6px 8px",
    fontSize: "13px", fontFamily: "inherit", cursor: "pointer",
    borderRadius: "6px",
  },
  btn: (active, color = "#3b82f6") => ({
    padding: "6px 12px", fontSize: "12px", fontWeight: 500,
    background: active ? color + "20" : "#181818",
    border: `1px solid ${active ? color : "#333"}`,
    color: active ? color : "#a0a0a0",
    cursor: "pointer", fontFamily: "inherit", borderRadius: "6px",
    transition: "all 0.15s", letterSpacing: "0.3px",
    boxShadow: active ? `0 0 8px ${color}40` : "none",
  }),
  zoneHdr: {
    padding: "8px 16px", cursor: "pointer",
    display: "flex", alignItems: "center", gap: "10px",
    fontSize: "13px", userSelect: "none", fontWeight: 500,
    background: "#131313", borderBottom: "1px solid #1f1f1f",
  },
  textarea: {
    width: "100%", background: "#141414",
    border: "1px solid #2a2a2a", color: "#e0e0e0",
    padding: "10px", fontSize: "13px", fontFamily: "'SF Mono', 'Menlo', monospace",
    resize: "vertical", outline: "none", borderRadius: "8px",
  },
  card: {
    background: "#111111", border: "1px solid #262626",
    borderRadius: "10px", padding: "12px",
  },
  badge: (color) => ({
    background: color + "22", color: color,
    padding: "2px 8px", borderRadius: "20px", fontSize: "11px",
    fontWeight: 500,
  }),
  labelRow: { display: "flex", alignItems: "center", gap: "12px", flexWrap: "wrap", marginBottom: "6px" },
  smallLabel: { color: "#8a8a8a", fontSize: "12px", minWidth: "70px" },
};

// ----- 可折叠区块 (复用) -----
function CollapseZone({ label, color, badge, defaultOpen = false, children, actions }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ borderBottom: "1px solid #1a1a1a" }}>
      <div style={S.zoneHdr} onClick={() => setOpen(o => !o)}>
        <span style={{ color, fontSize: "12px", width: "16px" }}>{open ? "▼" : "▶"}</span>
        <span style={{ color: "#e0e0e0", letterSpacing: "0.3px" }}>{label}</span>
        {badge > 0 && <span style={S.badge(color)}>{badge}</span>}
        <div style={{ flex: 1 }} />
        {actions && <div onClick={e => e.stopPropagation()}>{actions}</div>}
      </div>
      {open && <div style={{ background: "#0d0d0d", padding: "12px 16px" }}>{children}</div>}
    </div>
  );
}

// ----- 消息气泡 (增强复制/重新生成) -----
function MessageBubble({ msg, index, isLast, loading, modelName, onCopy, onRegenerate, expandedReason, setExpandedReason }) {
  const isUser = msg.role === "user";
  const isErr = msg.content?.startsWith("[ERROR]");
  const isThinking = !msg.content && isLast && loading;

  const copyContent = () => {
    navigator.clipboard?.writeText(msg.content).then(() => {
      alert("内容已复制");
    }).catch(() => {});
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: isUser ? "flex-end" : "flex-start", gap: "4px", marginBottom: "8px" }}>
      <div style={{ fontSize: "11px", color: "#5a5a5a", display: "flex", alignItems: "center", gap: "8px" }}>
        <span>{isUser ? "USER" : `AI · ${msg.model || modelName}`}</span>
        {!isUser && msg.content && (
          <span style={{ display: "flex", gap: "6px" }}>
            <span onClick={copyContent} style={{ cursor: "pointer", color: "#4a6fa5" }}>📋 复制</span>
            <span onClick={onRegenerate} style={{ cursor: "pointer", color: "#8a6a3a" }}>🔄 重新生成</span>
          </span>
        )}
      </div>

      {msg.reasoning && (
        <div style={{ maxWidth: "90%", width: "100%" }}>
          <div
            onClick={() => setExpandedReason(prev => ({ ...prev, [index]: !prev[index] }))}
            style={{ fontSize: "11px", color: "#5a7a9a", cursor: "pointer", padding: "4px 0", userSelect: "none" }}
          >
            {expandedReason[index] ? "▼" : "▶"} 思维链 ({msg.reasoning.length} 字符)
          </div>
          {expandedReason[index] && (
            <div style={{
              background: "#0a1018", border: "1px solid #1e2a3a",
              padding: "10px", fontSize: "12px", color: "#7a9ab8",
              whiteSpace: "pre-wrap", wordBreak: "break-word",
              lineHeight: "1.6", maxHeight: "200px", overflowY: "auto",
              borderRadius: "6px", marginTop: "4px"
            }}>
              {msg.reasoning}
            </div>
          )}
        </div>
      )}

      <div style={{
        maxWidth: "90%",
        background: isUser ? "#142114" : isErr ? "#1a1010" : "#151515",
        border: `1px solid ${isUser ? "#2a4a2a" : isErr ? "#4a2020" : "#2a2a2a"}`,
        padding: "12px 16px", fontSize: "14px", borderRadius: "12px",
        color: isErr ? "#f08080" : "#ddd",
        whiteSpace: "pre-wrap", wordBreak: "break-word", lineHeight: "1.7",
        boxShadow: "0 2px 8px rgba(0,0,0,0.3)",
      }}>
        {isThinking ? (
          <span style={{ display: "flex", gap: "4px", color: "#4a7a4a" }}>
            <span>▌</span><span style={{ opacity: 0.5 }}>思考中...</span>
          </span>
        ) : msg.content}
      </div>
    </div>
  );
}

// ----- 主应用 (API强化版) -----
function App() {
  // --- 基础状态 ---
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE_KEYS.API_KEY) || "");
  const [model, setModel] = useState("deepseek-chat");
  const [streaming, setStreaming] = useState(true);
  const [deepThink, setDeepThink] = useState(false);
  const [maxTokens, setMaxTokens] = useState(4096);

  // --- 新增高级参数 (强化API调用) ---
  const loadAdvanced = () => {
    try {
      const saved = localStorage.getItem(STORAGE_KEYS.ADVANCED);
      return saved ? JSON.parse(saved) : { temp: 1.0, topP: 1.0, freqPenalty: 0, presPenalty: 0, jsonMode: false };
    } catch { return { temp: 1.0, topP: 1.0, freqPenalty: 0, presPenalty: 0, jsonMode: false }; }
  };
  const [advanced, setAdvanced] = useState(loadAdvanced);
  
  // 持久化高级设置
  useEffect(() => {
    localStorage.setItem(STORAGE_KEYS.ADVANCED, JSON.stringify(advanced));
  }, [advanced]);

  const updateAdvanced = (key, value) => setAdvanced(prev => ({ ...prev, [key]: value }));

  // 前记忆区
  const [sysPrompt, setSysPrompt] = useState(() => localStorage.getItem(STORAGE_KEYS.SYS_PROMPT) || "");
  const [files, setFiles] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEYS.FILES);
    return saved ? JSON.parse(saved) : [];
  });

  // 聊天区
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState("");

  // 后记忆区
  const [history, setHistory] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEYS.HISTORY);
    return saved ? JSON.parse(saved) : [];
  });

  const [expandedReason, setExpandedReason] = useState({});
  const [showSettings, setShowSettings] = useState(false);

  const chatEndRef = useRef(null);
  const abortRef = useRef(null);
  const fileInputRef = useRef(null);

  // 持久化
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.API_KEY, apiKey); }, [apiKey]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.SYS_PROMPT, sysPrompt); }, [sysPrompt]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.FILES, JSON.stringify(files)); }, [files]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(history)); }, [history]);
  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const activeModel = deepThink ? "deepseek-reasoner" : model;

  // 构建系统消息 (含知识库)
  const buildSystemMsg = useCallback(() => {
    let sys = sysPrompt.trim();
    if (files.length > 0) {
      sys += "\n\n=== 知识库 (上传文件) ===\n";
      files.forEach(f => { sys += `\n[文件: ${f.name}]\n${f.content}\n`; });
      sys += "=== 结束 ===";
    }
    // 若开启JSON模式且系统中未明确要求JSON，可追加提示（不强制修改用户prompt）
    if (advanced.jsonMode && !sys.toLowerCase().includes("json")) {
      // 仅做友好提醒，不强制改写（用户可在系统提示自行添加）
    }
    return sys.trim();
  }, [sysPrompt, files, advanced.jsonMode]);

  // ----- 核心发送逻辑 (强化API参数) -----
  const sendMessage = async (overrideInput) => {
    const userContent = (overrideInput ?? input).trim();
    if (!userContent || loading || !apiKey.trim()) return;

    const userMsg = { role: "user", content: userContent };
    const nextMsgs = [...messages, userMsg];
    setMessages(nextMsgs);
    setInput("");
    setLoading(true);
    setStatus("正在连接...");

    const sysContent = buildSystemMsg();
    const apiMsgs = [
      ...(sysContent ? [{ role: "system", content: sysContent }] : []),
      ...nextMsgs,
    ];

    const aId = `a_${Date.now()}`;
    setMessages(m => [...m, { role: "assistant", content: "", reasoning: "", id: aId, model: activeModel }]);

    let finalContent = "";
    let finalReasoning = "";

    try {
      abortRef.current = new AbortController();
      
      // ----- 构建强化请求体 (包含温度/top_p/惩罚/JSON模式) -----
      const requestBody = {
        model: activeModel,
        messages: apiMsgs,
        stream: streaming,
        max_tokens: maxTokens,
        temperature: advanced.temp,
        top_p: advanced.topP,
        frequency_penalty: advanced.freqPenalty,
        presence_penalty: advanced.presPenalty,
      };

      // JSON模式 (仅当非reasoner模型且开启时添加，reasoner可能不支持，但API会忽略)
      if (advanced.jsonMode && activeModel !== "deepseek-reasoner") {
        requestBody.response_format = { type: "json_object" };
      } else if (advanced.jsonMode) {
        // 若reasoner开启json模式，仍尝试发送（api可能报错，但由用户自行承担）
        requestBody.response_format = { type: "json_object" };
      }

      // 注意：deepseek-reasoner 对部分参数有限制，但API会处理无效参数，这里保留灵活性

      const res = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey.trim()}`,
        },
        body: JSON.stringify(requestBody),
        signal: abortRef.current.signal,
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      if (streaming) {
        setStatus("接收中...");
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6).trim();
            if (raw === "[DONE]") break;
            try {
              const j = JSON.parse(raw);
              const delta = j.choices?.[0]?.delta || {};
              if (delta.content) finalContent += delta.content;
              if (delta.reasoning_content) finalReasoning += delta.reasoning_content;
              setMessages(m => m.map(msg =>
                msg.id === aId ? { ...msg, content: finalContent, reasoning: finalReasoning } : msg
              ));
            } catch (_) {}
          }
        }
      } else {
        setStatus("等待响应...");
        const data = await res.json();
        const msg = data.choices?.[0]?.message || {};
        finalContent = msg.content || "";
        finalReasoning = msg.reasoning_content || "";
        setMessages(m => m.map(msg =>
          msg.id === aId ? { ...msg, content: finalContent, reasoning: finalReasoning } : msg
        ));
      }

      // 存入历史
      const historyEntry = {
        id: aId,
        timestamp: new Date().toISOString(),
        model: activeModel,
        user: userContent,
        assistant: finalContent,
        reasoning: finalReasoning,
      };
      setHistory(prev => [...prev, historyEntry]);
      setStatus("");

    } catch (err) {
      if (err.name !== "AbortError") {
        setMessages(m => m.map(msg =>
          msg.id === aId ? { ...msg, content: `[ERROR] ${err.message}` } : msg
        ));
        setStatus("错误");
      } else {
        setStatus("已停止");
      }
    } finally {
      setLoading(false);
      setTimeout(() => setStatus(""), 2500);
    }
  };

  const stopGeneration = () => abortRef.current?.abort();

  // 文件处理
  const handleFileUpload = (e) => {
    const newFiles = Array.from(e.target.files);
    Promise.all(newFiles.map(f => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = ev => resolve({ name: f.name, size: f.size, content: ev.target.result });
      reader.readAsText(f);
    }))).then(loadedFiles => {
      setFiles(prev => [...prev, ...loadedFiles]);
    });
    e.target.value = "";
  };

  const removeFile = (idx) => setFiles(prev => prev.filter((_, i) => i !== idx));
  const clearChat = () => { if (confirm("清空当前聊天记录？")) setMessages([]); };

  const restoreFromHistory = (entry) => {
    const restored = [
      { role: "user", content: entry.user },
      { role: "assistant", content: entry.assistant, reasoning: entry.reasoning, model: entry.model }
    ];
    setMessages(restored);
  };

  const regenerateLast = () => {
    if (messages.length < 2) return;
    const lastUserMsg = [...messages].reverse().find(m => m.role === "user");
    if (lastUserMsg) {
      setMessages(prev => prev.filter(m => m.role !== "assistant" || m.id !== prev[prev.length-1]?.id));
      sendMessage(lastUserMsg.content);
    }
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(history, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `deepseek_${Date.now()}.json`;
    a.click();
  };
  const exportTXT = () => {
    const text = history.map(h =>
      `[${new Date(h.timestamp).toLocaleString()}] [${h.model}]\nUSER: ${h.user}\nASSISTANT: ${h.assistant}\n` +
      (h.reasoning ? `REASONING: ${h.reasoning}\n` : "") + "─".repeat(60)
    ).join("\n\n");
    const blob = new Blob([text], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `deepseek_${Date.now()}.txt`;
    a.click();
  };

  return (
    <div style={S.root}>
      {/* 顶栏 */}
      <div style={S.header}>
        <span style={{ color: "#4a7a9a", fontWeight: 600, letterSpacing: "0.5px" }}>DEEPSEEK · 三区记忆 (强化版)</span>

        <input
          type="password"
          placeholder="API Key (sk-...)"
          value={apiKey}
          onChange={e => setApiKey(e.target.value)}
          style={{ ...S.input, flex: 2, minWidth: "200px" }}
        />

        <select value={model} onChange={e => setModel(e.target.value)} style={S.select} disabled={deepThink}>
          {MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
        </select>

        <button onClick={() => setStreaming(s => !s)} style={S.btn(streaming, "#10b981")}>
          {streaming ? "⚡ 流式" : "📦 批量"}
        </button>

        <button onClick={() => setDeepThink(d => !d)} style={S.btn(deepThink, "#8b5cf6")}>
          {deepThink ? "🧠 R1·深度思考" : "💬 普通模式"}
        </button>

        <button onClick={clearChat} style={S.btn(false, "#6b7280")}>🗑 清空聊天</button>
        <button onClick={() => setShowSettings(s => !s)} style={S.btn(showSettings, "#f59e0b")}>⚙️ 设置</button>

        {status && <span style={{ fontSize: "12px", color: "#4a7a9a", marginLeft: "auto" }}>{status}</span>}
      </div>

      {/* 设置面板 (包含原有max_tokens + 新增高级参数) */}
      {showSettings && (
        <div style={{ padding: "12px 16px", background: "#111", borderBottom: "1px solid #262626", display: "flex", flexDirection: "column", gap: "12px" }}>
          <div style={S.labelRow}>
            <span style={S.smallLabel}>Max Tokens:</span>
            <input type="number" value={maxTokens} onChange={e => setMaxTokens(Number(e.target.value))}
              min={100} max={8192} step={100} style={{ ...S.input, width: "100px" }} />
            <span style={{ color: "#666", fontSize: "12px", marginLeft: "8px" }}>建议 2048-4096</span>
          </div>
          
          {/* ----- 强化参数区 (温度/top_p/惩罚/JSON) ----- */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: "16px 24px", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={S.smallLabel}>温度:</span>
              <input type="number" value={advanced.temp} onChange={e => updateAdvanced('temp', parseFloat(e.target.value) || 1.0)} 
                min={0} max={2} step={0.1} style={{ ...S.input, width: "70px" }} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={S.smallLabel}>Top P:</span>
              <input type="number" value={advanced.topP} onChange={e => updateAdvanced('topP', parseFloat(e.target.value) || 1.0)} 
                min={0} max={1} step={0.05} style={{ ...S.input, width: "70px" }} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={S.smallLabel}>频率惩罚:</span>
              <input type="number" value={advanced.freqPenalty} onChange={e => updateAdvanced('freqPenalty', parseFloat(e.target.value) || 0)} 
                min={-2} max={2} step={0.1} style={{ ...S.input, width: "70px" }} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={S.smallLabel}>存在惩罚:</span>
              <input type="number" value={advanced.presPenalty} onChange={e => updateAdvanced('presPenalty', parseFloat(e.target.value) || 0)} 
                min={-2} max={2} step={0.1} style={{ ...S.input, width: "70px" }} />
            </div>
            <label style={{ display: "flex", alignItems: "center", gap: "6px", color: "#aaa", cursor: "pointer" }}>
              <input type="checkbox" checked={advanced.jsonMode} onChange={e => updateAdvanced('jsonMode', e.target.checked)} />
              <span style={{ fontSize: "12px" }}>JSON模式</span>
            </label>
            <span style={{ color: "#4a6a8a", fontSize: "11px", marginLeft: "auto" }}>⚡ 参数直接作用于API · 强化调用</span>
          </div>
          <div style={{ fontSize: "11px", color: "#4a5a5a", borderTop: "1px solid #222", paddingTop: "6px" }}>
            * 温度/惩罚等参数已全面启用。JSON模式需配合系统提示使用。
          </div>
        </div>
      )}

      {/* 三区主体 */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* 前记忆区 */}
        <CollapseZone label="📁 前记忆区 · 系统提示 & 知识库" color="#10b981" badge={files.length} defaultOpen={true}>
          <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>
            <div style={{ flex: 2, minWidth: "240px" }}>
              <div style={{ fontSize: "12px", color: "#4a7a5a", marginBottom: "6px" }}>📝 系统提示词</div>
              <textarea
                value={sysPrompt}
                onChange={e => setSysPrompt(e.target.value)}
                placeholder="定义 AI 角色、知识范围、回答风格..."
                style={{ ...S.textarea, height: "90px" }}
              />
            </div>
            <div style={{ flex: 1.5, minWidth: "220px" }}>
              <div style={{ fontSize: "12px", color: "#4a7a5a", marginBottom: "6px" }}>📎 文件知识库</div>
              <div style={{ display: "flex", gap: "8px", marginBottom: "8px" }}>
                <button onClick={() => fileInputRef.current?.click()} style={S.btn(true, "#10b981")}>+ 上传文件</button>
                <button onClick={() => setFiles([])} style={S.btn(false, "#ef4444")}>清空</button>
                <input type="file" multiple ref={fileInputRef} onChange={handleFileUpload} style={{ display: "none" }} />
              </div>
              <div style={{ maxHeight: "120px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "4px" }}>
                {files.map((f, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: "8px", background: "#181818", padding: "4px 10px", borderRadius: "6px" }}>
                    <span style={{ color: "#10b981" }}>📄</span>
                    <span style={{ flex: 1, fontSize: "12px", color: "#ccc", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</span>
                    <span style={{ color: "#555", fontSize: "11px" }}>{(f.size/1024).toFixed(1)}K</span>
                    <button onClick={() => removeFile(i)} style={{ background: "none", border: "none", color: "#f87171", cursor: "pointer", fontSize: "14px" }}>✕</button>
                  </div>
                ))}
                {files.length === 0 && <div style={{ color: "#3a3a3a", fontSize: "12px", padding: "4px" }}>暂无文件，支持 .txt/.md/.json/.py 等文本文件</div>}
              </div>
            </div>
          </div>
        </CollapseZone>

        {/* 聊天区 */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minHeight: 0 }}>
          <div style={{ flex: 1, overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", gap: "6px" }}>
            {messages.length === 0 && (
              <div style={{ color: "#2a2a2a", textAlign: "center", marginTop: "40px", fontSize: "14px" }}>
                ✨ 输入消息开始对话 · 前记忆区的文件内容将自动作为上下文
              </div>
            )}
            {messages.map((msg, i) => (
              <MessageBubble
                key={i}
                msg={msg}
                index={i}
                isLast={i === messages.length - 1}
                loading={loading}
                modelName={activeModel}
                onCopy={() => navigator.clipboard?.writeText(msg.content)}
                onRegenerate={i === messages.length - 1 && !msg.role.startsWith("user") ? regenerateLast : undefined}
                expandedReason={expandedReason}
                setExpandedReason={setExpandedReason}
              />
            ))}
            <div ref={chatEndRef} />
          </div>

          {/* 输入栏 */}
          <div style={{ padding: "12px 16px", borderTop: "1px solid #262626", background: "#0f0f0f", display: "flex", gap: "10px", alignItems: "flex-end" }}>
            <textarea
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
              placeholder={apiKey ? "输入消息... (Enter 发送 / Shift+Enter 换行)" : "⚠️ 请先填写 API Key"}
              disabled={loading || !apiKey}
              style={{ ...S.textarea, flex: 1, height: "60px", maxHeight: "150px" }}
            />
            {loading ? (
              <button onClick={stopGeneration} style={{ ...S.btn(true, "#ef4444"), padding: "12px 18px", fontSize: "14px" }}>
                ⏹ 停止
              </button>
            ) : (
              <button onClick={() => sendMessage()} disabled={!apiKey || !input.trim()}
                style={{ ...S.btn(!!(apiKey && input.trim()), "#10b981"), padding: "12px 18px", fontSize: "14px" }}>
                ▶ 发送
              </button>
            )}
          </div>
        </div>

        {/* 后记忆区 */}
        <CollapseZone label="📚 后记忆区 · 对话存档" color="#f59e0b" badge={history.length}
          actions={
            <div style={{ display: "flex", gap: "6px" }}>
              <button onClick={exportJSON} style={S.btn(false, "#f59e0b")}>↓ JSON</button>
              <button onClick={exportTXT} style={S.btn(false, "#f59e0b")}>↓ TXT</button>
              <button onClick={() => { if (confirm("清空所有存档？")) setHistory([]); }} style={S.btn(false, "#ef4444")}>清空</button>
            </div>
          }>
          <div style={{ maxHeight: "180px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "6px" }}>
            {history.length === 0 ? (
              <div style={{ color: "#3a3a3a", padding: "8px", textAlign: "center" }}>暂无存档，对话完成后会自动保存</div>
            ) : (
              history.slice().reverse().map((h, idx) => (
                <div key={h.id} style={{ background: "#151515", borderRadius: "8px", padding: "10px", border: "1px solid #2a2a2a" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
                    <span style={{ color: "#aaa", fontSize: "12px" }}>
                      #{history.length - idx} · {new Date(h.timestamp).toLocaleString()} · <span style={{ color: "#f59e0b" }}>{h.model}</span>
                    </span>
                    <div style={{ display: "flex", gap: "8px" }}>
                      <span onClick={() => restoreFromHistory(h)} style={{ cursor: "pointer", color: "#4a7a9a", fontSize: "12px" }}>📂 加载到聊天</span>
                    </div>
                  </div>
                  <div style={{ color: "#8a8a8a", fontSize: "13px", marginBottom: "4px" }}>
                    <span style={{ color: "#6a8a6a" }}>Q:</span> {h.user.slice(0, 100)}{h.user.length > 100 ? "…" : ""}
                  </div>
                  <div style={{ color: "#7a7a7a", fontSize: "13px" }}>
                    <span style={{ color: "#8a7a4a" }}>A:</span> {h.assistant.slice(0, 100)}{h.assistant.length > 100 ? "…" : ""}
                  </div>
                </div>
              ))
            )}
          </div>
        </CollapseZone>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
